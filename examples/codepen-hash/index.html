<main><h1>QIVTO SHA-256 demo</h1><form><label>Text <textarea required>Hello QIVTO</textarea></label><button>Generate hash</button></form><pre aria-live="polite"></pre><p><a href="https://qivto.com/en/api" target="_blank" rel="noopener">Built with QIVTO API</a></p></main><script>document.querySelector('form').onsubmit=async e=>{e.preventDefault();const out=document.querySelector('pre');out.textContent='Loading…';try{const r=await fetch('https://qivto.com/api/v1/hash',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:e.currentTarget.querySelector('textarea').value,algorithm:'sha256'})}),data=await r.json();if(!r.ok)throw Error(data.error||'Request failed');out.textContent=data.hash}catch(error){out.textContent=error.message}}</script><style>body{font:16px system-ui;background:#07111d;color:#e8eef7}main{max-width:700px;margin:8vh auto;padding:30px}label,textarea{display:block;width:100%}textarea{box-sizing:border-box;min-height:140px;margin:8px 0;padding:12px}button{padding:10px 16px}pre{white-space:pre-wrap;overflow-wrap:anywhere;color:#86efac}a{color:#7dd3fc}</style>
