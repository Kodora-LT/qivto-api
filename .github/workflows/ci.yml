name: Clients CI
on: [push, pull_request]
jobs:
  javascript:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: clients/javascript}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - run: npm test
      - run: npm pack --dry-run
  python:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: clients/python}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m unittest discover -s tests
      - run: python -m pip install build
      - run: python -m build
  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: {php-version: '8.2'}
      - run: composer validate --strict clients/php/composer.json
      - run: find clients/php/src -name '*.php' -print0 | xargs -0 -n1 php -l
